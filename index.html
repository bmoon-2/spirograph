<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Spirograph v3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <h1>✦ Shape Spirograph ✦</h1>

  <div class="presets">
    <button onclick="setShape('U')">U</button>
    <button onclick="setShape('T')">T</button>
    <button onclick="setShape('1')">1</button>
    <button onclick="setShape('A')">A</button>
    <button onclick="setShape('S')">S</button>
    <button onclick="setShape('★')">★</button>
    <button onclick="setShape('♡')">♡</button>
    <button onclick="setShape('あ')">あ</button>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>輪郭ソース</label>
      <select id="sourceMode">
        <option value="text">文字</option>
        <option value="svg">SVG</option>
      </select>
    </div>
    <div class="control-group">
      <label>文字 / Shape</label>
      <input type="text" id="shapeText" value="U" maxlength="4">
    </div>
    <div class="control-group">
      <label>SVGアップロード</label>
      <input type="file" id="svgUpload" accept=".svg,image/svg+xml">
      <button class="small secondary" onclick="clearUploadedSvg()">SVG解除</button>
    </div>
    <div class="control-group">
      <label>ギア半径</label>
      <input type="range" id="gearRadius" min="8" max="60" value="28">
      <span class="range-val" id="gearRadiusVal">28</span>
    </div>
    <div class="control-group">
      <label>ペン距離</label>
      <input type="range" id="penDist" min="5" max="80" value="22">
      <span class="range-val" id="penDistVal">22</span>
    </div>
    <div class="control-group">
      <label>周回数</label>
      <input type="range" id="loops" min="1" max="60" value="25">
      <span class="range-val" id="loopsVal">25</span>
    </div>
    <div class="control-group">
      <label>スピード</label>
      <input type="range" id="speed" min="1" max="50" value="10">
      <span class="range-val" id="speedVal">10</span>
    </div>
    <div class="control-group">
      <label>色</label>
      <select id="colorMode">
        <option value="blue">ブルー</option>
        <option value="pink-purple">ピンク×パープル</option>
        <option value="red">レッド</option>
        <option value="green">グリーン</option>
        <option value="rainbow">レインボー</option>
      </select>
    </div>
    <div class="control-group" style="justify-content:flex-end;">
      <button onclick="startDraw(false)">▶ 描画</button>
    </div>
    <div class="control-group" style="justify-content:flex-end;">
      <button class="secondary" onclick="previewPathMotion()">▶ パス沿いプレビュー</button>
    </div>
    <div class="control-group" style="justify-content:flex-end;">
      <button id="debugBtn" onclick="toggleDebug()">🔍 デバッグ</button>
    </div>
    <div class="control-group" style="justify-content:flex-end;">
      <button class="secondary" onclick="clearCanvas()">クリア</button>
    </div>
  </div>

  <div class="export-bar">
    <button class="export-btn" onclick="exportSVG()">💾 SVG書き出し</button>
    <button class="export-btn" onclick="exportPNG()">💾 PNG書き出し</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>
  <div class="status" id="status"></div>
</div>

<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/contour.js"></script>
<script src="js/svgImport.js"></script>
<script src="js/math.js"></script>
<script src="js/draw.js"></script>
<script src="js/debug.js"></script>
<script src="js/export.js"></script>
<script src="js/main.js"></script>
</body>
</html>
